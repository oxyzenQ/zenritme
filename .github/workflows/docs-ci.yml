name: Docs CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.rst'
      - 'LICENSE'
      - 'NOTICE.md'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.rst'
      - 'LICENSE'
      - 'NOTICE.md'

permissions:
  contents: read

jobs:
  lint:
    name: Docs Spelling Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Check documentation files
        run: |
          find . -type f \( -name '*.md' -o -name '*.txt' -o -name '*.rst' \) -print0             | xargs -0r codespell
