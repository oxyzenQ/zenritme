---
name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # ── Safety gates ─────────────────────────────────────────────────────

      - name: Validate tag version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            grep '^version = ' Cargo.toml | head -1 \
              | sed 's/version = "\(.*\)"/\1/'
          )
          echo "Tag version:    ${TAG_VERSION}"
          echo "Cargo.toml:     ${CARGO_VERSION}"
          if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}'" \
              "does not match Cargo.toml '${CARGO_VERSION}'"
            exit 1
          fi
          echo "VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
        shell: bash

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash

      - name: Validate sound assets
        run: |
          set -euo pipefail
          python3 scripts/generate-sounds.py
          for f in start pause phase complete; do
            test -f "assets/sounds/${f}.wav" \
              || { echo "Missing ${f}.wav"; exit 1; }
          done
          echo "All sound assets present and generated."
        shell: bash

      # ── Build ──────────────────────────────────────────────────────────

      - name: Build release binary
        run: cargo build --release

      - name: Smoke test
        run: |
          set -euo pipefail
          HELP_OUTPUT=$(./target/release/zenritme --help)
          echo "${HELP_OUTPUT}"
          if ! echo "${HELP_OUTPUT}" | head -1 \
              | grep -q "zenritme v${VERSION}"; then
            echo "::error::--help output does not include" \
              " expected version 'zenritme v${VERSION}'"
            exit 1
          fi
          # Verify --version output
          ./target/release/zenritme -V
          # Verify --sound-test runs without error
          ./target/release/zenritme --sound-test
        shell: bash

      # ── Package ────────────────────────────────────────────────────────

      - name: Package release archive
        run: |
          set -euo pipefail
          ARCHIVE_NAME="zenritme-v${VERSION}-linux-amd64-gnu"
          STAGING="${ARCHIVE_NAME}"
          mkdir -p "${STAGING}/scripts" \
            "${STAGING}/docs" \
            "${STAGING}/assets/sounds" \
            "${STAGING}/completions" \
            "${STAGING}/man"
          cp target/release/zenritme     "${STAGING}/"
          cp README.md                    "${STAGING}/"
          cp LICENSE                      "${STAGING}/"
          cp NOTICE.md                    "${STAGING}/"
          cp docs/RULES.md                "${STAGING}/"
          cp docs/SECURITY.md             "${STAGING}/docs/"
          cp docs/ENDURANCE.md            "${STAGING}/docs/"
          cp scripts/install.sh           "${STAGING}/scripts/"
          cp scripts/uninstall.sh         "${STAGING}/scripts/"
          cp scripts/generate-sounds.py   "${STAGING}/scripts/"
          cp scripts/endurance-smoke.sh   "${STAGING}/scripts/"
          cp scripts/doctor.sh             "${STAGING}/scripts/"
          cp assets/sounds/*.wav           "${STAGING}/assets/sounds/"
          cp assets/sounds/README.md      "${STAGING}/assets/sounds/"
          cp completions/zenritme.bash    "${STAGING}/completions/"
          cp completions/zenritme.zsh     "${STAGING}/completions/"
          cp completions/zenritme.fish    "${STAGING}/completions/"
          cp man/zenritme.1               "${STAGING}/man/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
        shell: bash

      - name: Generate checksums
        run: |
          set -euo pipefail
          # Checksums: SHA-512 (classical) + BLAKE2b-512 + SHAKE256 (quantum-resistant)
          sha512sum "${ARCHIVE}" > "${ARCHIVE}.sha512sum"
          b2sum "${ARCHIVE}" > "${ARCHIVE}.b2sum"
          HASH=$(openssl dgst -shake256 "${ARCHIVE}" | awk -F'= ' '{print $2}')
          echo "${HASH}  ${ARCHIVE}" > "${ARCHIVE}.shake256"
          echo "=== Checksums ==="
          cat "${ARCHIVE}.sha512sum"
          cat "${ARCHIVE}.b2sum"
          cat "${ARCHIVE}.shake256"
        shell: bash

      # ── Musl static binary (v10) ─────────────────────────────────────

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/zenritme
          ldd target/x86_64-unknown-linux-musl/release/zenritme \
            || echo "Static binary (no dynamic deps)"
        shell: bash

      - name: Package musl archive
        run: |
          set -euo pipefail
          MUSL_NAME="zenritme-v${VERSION}-linux-amd64-musl"
          STAGING="${MUSL_NAME}"
          mkdir -p "${STAGING}/scripts" \
            "${STAGING}/docs" \
            "${STAGING}/assets/sounds" \
            "${STAGING}/completions" \
            "${STAGING}/man"
          cp target/x86_64-unknown-linux-musl/release/zenritme \
            "${STAGING}/"
          cp README.md                    "${STAGING}/"
          cp LICENSE                      "${STAGING}/"
          cp NOTICE.md                    "${STAGING}/"
          cp docs/RULES.md                "${STAGING}/"
          cp docs/SECURITY.md             "${STAGING}/docs/"
          cp docs/ENDURANCE.md            "${STAGING}/docs/"
          cp scripts/install.sh           "${STAGING}/scripts/"
          cp scripts/uninstall.sh         "${STAGING}/scripts/"
          cp scripts/generate-sounds.py   "${STAGING}/scripts/"
          cp scripts/endurance-smoke.sh   "${STAGING}/scripts/"
          cp scripts/doctor.sh            "${STAGING}/scripts/"
          cp assets/sounds/*.wav           "${STAGING}/assets/sounds/"
          cp assets/sounds/README.md      "${STAGING}/assets/sounds/"
          cp completions/zenritme.bash    "${STAGING}/completions/"
          cp completions/zenritme.zsh     "${STAGING}/completions/"
          cp completions/zenritme.fish    "${STAGING}/completions/"
          cp man/zenritme.1               "${STAGING}/man/"
          tar czf "${MUSL_NAME}.tar.gz" "${STAGING}"
          # Checksums: SHA-512 (classical) + BLAKE2b-512 + SHAKE256 (quantum-resistant)
          sha512sum "${MUSL_NAME}.tar.gz" > "${MUSL_NAME}.tar.gz.sha512sum"
          b2sum "${MUSL_NAME}.tar.gz" > "${MUSL_NAME}.tar.gz.b2sum"
          HASH=$(openssl dgst -shake256 "${MUSL_NAME}.tar.gz" | awk -F'= ' '{print $2}')
          echo "${HASH}  ${MUSL_NAME}.tar.gz" > "${MUSL_NAME}.tar.gz.shake256"
          echo "MUSL_ARCHIVE=${MUSL_NAME}.tar.gz" >> "$GITHUB_ENV"
        shell: bash

      # ── Release ──────────────────────────────────────────────────────────

      - name: Determine prerelease
        id: prerelease
        run: |
          if echo "${VERSION}" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Generate release body
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          {
            if [ -n "$PREV_TAG" ]; then
              echo "## What's Changed"
              echo ""
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
            else
              echo "Initial release."
            fi
          } > release-body.md
          echo "=== Release body ==="
          cat release-body.md
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha512sum
            ${{ env.ARCHIVE }}.b2sum
            ${{ env.ARCHIVE }}.shake256
            ${{ env.MUSL_ARCHIVE }}
            ${{ env.MUSL_ARCHIVE }}.sha512sum
            ${{ env.MUSL_ARCHIVE }}.b2sum
            ${{ env.MUSL_ARCHIVE }}.shake256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
