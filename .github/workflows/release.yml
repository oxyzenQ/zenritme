---
name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # ── Safety gates ─────────────────────────────────────────────────────

      - name: Validate tag version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            grep '^version = ' Cargo.toml | head -1 \
              | sed 's/version = "\(.*\)"/\1/'
          )
          echo "Tag version:    ${TAG_VERSION}"
          echo "Cargo.toml:     ${CARGO_VERSION}"
          if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}'" \
              "does not match Cargo.toml '${CARGO_VERSION}'"
            exit 1
          fi
          echo "VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
        shell: bash

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash

      - name: Validate sound assets
        run: |
          set -euo pipefail
          python3 scripts/generate-sounds.py
          for f in start pause phase complete; do
            test -f "assets/sounds/${f}.wav" \
              || { echo "Missing ${f}.wav"; exit 1; }
          done
          echo "All sound assets present and generated."
        shell: bash

      # ── Build ──────────────────────────────────────────────────────────

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test
        run: |
          set -euo pipefail
          HELP_OUTPUT=$(./target/release/zenritme --help)
          echo "${HELP_OUTPUT}"
          if ! echo "${HELP_OUTPUT}" | head -1 \
              | grep -q "zenritme v${VERSION}"; then
            echo "::error::--help output does not include" \
              " expected version 'zenritme v${VERSION}'"
            exit 1
          fi
          # Verify --version output
          ./target/release/zenritme -V
          # Verify --sound-test runs without error
          ./target/release/zenritme --sound-test
        shell: bash

      # ── Package ────────────────────────────────────────────────────────

      - name: Package release archive
        run: |
          set -euo pipefail
          ARCHIVE_NAME="zenritme-v${VERSION}-x86_64-unknown-linux-gnu"
          STAGING="${ARCHIVE_NAME}"
          mkdir -p "${STAGING}/scripts" \
            "${STAGING}/docs" \
            "${STAGING}/assets/sounds" \
            "${STAGING}/completions" \
            "${STAGING}/man"
          cp target/release/zenritme     "${STAGING}/"
          cp README.md                    "${STAGING}/"
          cp LICENSE                      "${STAGING}/"
          cp NOTICE.md                    "${STAGING}/"
          cp RULES.md                     "${STAGING}/"
          cp docs/SECURITY.md             "${STAGING}/docs/"
          cp docs/ENDURANCE.md            "${STAGING}/docs/"
          cp scripts/install.sh           "${STAGING}/scripts/"
          cp scripts/uninstall.sh         "${STAGING}/scripts/"
          cp scripts/generate-sounds.py   "${STAGING}/scripts/"
          cp scripts/endurance-smoke.sh   "${STAGING}/scripts/"
          cp scripts/doctor.sh             "${STAGING}/scripts/"
          cp assets/sounds/*.wav           "${STAGING}/assets/sounds/"
          cp assets/sounds/README.md      "${STAGING}/assets/sounds/"
          cp completions/zenritme.bash    "${STAGING}/completions/"
          cp completions/zenritme.zsh     "${STAGING}/completions/"
          cp completions/zenritme.fish    "${STAGING}/completions/"
          cp man/zenritme.1               "${STAGING}/man/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
        shell: bash

      - name: Generate SHA512 checksum
        run: |
          set -euo pipefail
          sha512sum "${ARCHIVE}" > "${ARCHIVE}.sha512sum"
          echo "Checksum:"
          cat "${ARCHIVE}.sha512sum"
        shell: bash

      # ── Musl static binary (v10) ─────────────────────────────────────

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static musl binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/zenritme
          ldd target/x86_64-unknown-linux-musl/release/zenritme \
            || echo "Static binary (no dynamic deps)"
        shell: bash

      - name: Package musl archive
        run: |
          set -euo pipefail
          MUSL_NAME="zenritme-v${VERSION}-x86_64-unknown-linux-musl"
          STAGING="${MUSL_NAME}"
          mkdir -p "${STAGING}/scripts" \
            "${STAGING}/docs" \
            "${STAGING}/assets/sounds" \
            "${STAGING}/completions" \
            "${STAGING}/man"
          cp target/x86_64-unknown-linux-musl/release/zenritme \
            "${STAGING}/"
          cp README.md                    "${STAGING}/"
          cp LICENSE                      "${STAGING}/"
          cp NOTICE.md                    "${STAGING}/"
          cp RULES.md                     "${STAGING}/"
          cp docs/SECURITY.md             "${STAGING}/docs/"
          cp docs/ENDURANCE.md            "${STAGING}/docs/"
          cp scripts/install.sh           "${STAGING}/scripts/"
          cp scripts/uninstall.sh         "${STAGING}/scripts/"
          cp scripts/generate-sounds.py   "${STAGING}/scripts/"
          cp scripts/endurance-smoke.sh   "${STAGING}/scripts/"
          cp scripts/doctor.sh            "${STAGING}/scripts/"
          cp assets/sounds/*.wav           "${STAGING}/assets/sounds/"
          cp assets/sounds/README.md      "${STAGING}/assets/sounds/"
          cp completions/zenritme.bash    "${STAGING}/completions/"
          cp completions/zenritme.zsh     "${STAGING}/completions/"
          cp completions/zenritme.fish    "${STAGING}/completions/"
          cp man/zenritme.1               "${STAGING}/man/"
          tar czf "${MUSL_NAME}.tar.gz" "${STAGING}"
          sha512sum "${MUSL_NAME}.tar.gz" > "${MUSL_NAME}.tar.gz.sha512sum"
          echo "MUSL_ARCHIVE=${MUSL_NAME}.tar.gz" >> "$GITHUB_ENV"
        shell: bash

      # ── Release ──────────────────────────────────────────────────────────

      - name: Generate release body
        run: |
          IS_RC=false
          if echo "${VERSION}" | grep -q '-'; then
            IS_RC=true
          fi

          if [ "${IS_RC}" = "true" ]; then
            cat > release-notes.md << BODY
          ## Release Candidate

          This is a pre-release build for testing.
          See [RULES.md](RULES.md) for project policies.

          BODY
          else
            cat > release-notes.md << BODY
          ## v10.0.0 — Peak Performance

          - Adaptive tick rate: 6x less CPU on long timers
          - Dirty render tracking: skip redraw when seconds unchanged
          - Static musl binary (zero dynamic deps, works on Alpine)
          - Premium terminal UI with themed rendering
          - 5 themes: void, ember, aura, forest, mono
          - 3 view modes: minimal, orbit, cinematic
          - Ritual sound architecture with no-spam cooldown
          - Sound profiles: `--sound-profile calm|silent`
          - Zero external Rust dependencies
          - 236 tests passing

          BODY
          fi

          # Append common install/uninstall section
          cat >> release-notes.md << BODY
          ## Install

          \`\`\`sh
          tar xzf zenritme-vVERSION-x86_64-unknown-linux-gnu.tar.gz
          cd zenritme-vVERSION-x86_64-unknown-linux-gnu
          sudo ./install.sh
          \`\`\`

          ## Uninstall

          \`\`\`sh
          ./uninstall.sh
          \`\`\`

          ## Assets

          - \`zenritme-vVERSION-x86_64-unknown-linux-gnu.tar.gz\`
            — release binary + docs
          - \`zenritme-vVERSION-x86_64-unknown-linux-gnu.tar.gz.sha512sum\` — SHA512 checksum
          BODY
          sed -i "s/VERSION/${VERSION}/g" release-notes.md
        shell: bash

      - name: Determine prerelease
        id: prerelease
        run: |
          if echo "${VERSION}" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zenritme v${{ env.VERSION }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha512sum
            ${{ env.MUSL_ARCHIVE }}
            ${{ env.MUSL_ARCHIVE }}.sha512sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
