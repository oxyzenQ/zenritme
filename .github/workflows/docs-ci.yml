name: Docs CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE.md'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE.md'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check spelling
        run: |
          # Basic check
          grep -r "." **/*.md > /dev/null
