---
name: Maintenance deps weekly

on:
  schedule:
    # Every Monday at 00:00 UTC (07:00 WIB)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Maintenance deps weekly validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-maint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-maint-

      - name: Update Cargo.lock
        run: cargo update

      - name: Enforce dependency-only diff
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dependencies are already up to date"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Auto-update may only modify Cargo.lock"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --all -- --check

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --locked

      - name: Run clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify release build
        if: steps.changes.outputs.changed == 'true'
        run: cargo build --release --locked

      - name: LOC guard
        if: steps.changes.outputs.changed == 'true'
        run: bash scripts/check-loc.sh

      - name: Upload validated Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: validated-cargo-lock
          path: Cargo.lock
          if-no-files-found: error

  commit:
    name: Maintenance deps weekly commit
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    permissions:
      contents: write

    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download validated Cargo.lock
        uses: actions/download-artifact@v6
        with:
          name: validated-cargo-lock
          path: .auto-update

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          cp .auto-update/Cargo.lock Cargo.lock

          if git diff --quiet; then
            echo "Validated lockfile is already current"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Commit job may only modify Cargo.lock"
            exit 1
          fi

          git add Cargo.lock
          git commit -m "chore(deps): maintenance deps weekly"
          git push origin main
