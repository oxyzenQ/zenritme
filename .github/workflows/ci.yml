---
name: CI

"on":
  push:
    branches:
      - main
    paths:
      - '**/*.rs'
      - '**/*.toml'
      - '**/*.sh'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.rs'
      - '**/*.toml'
      - '**/*.sh'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build script permissions
        run: chmod +x ./build.sh

      - name: Run check-all
        run: ./build.sh check-all --no-cache
        shell: bash

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash
