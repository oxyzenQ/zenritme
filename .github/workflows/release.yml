---
name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # ── Safety gates ─────────────────────────────────────────────────────

      - name: Validate tag version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            grep '^version = ' Cargo.toml | head -1 \
              | sed 's/version = "\(.*\)"/\1/'
          )
          echo "Tag version:    ${TAG_VERSION}"
          echo "Cargo.toml:     ${CARGO_VERSION}"
          if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}'" \
              "does not match Cargo.toml '${CARGO_VERSION}'"
            exit 1
          fi
          echo "VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
        shell: bash

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash

      - name: Validate sound assets
        run: |
          set -euo pipefail
          python3 scripts/generate-sounds.py
          for f in start pause phase complete; do
            test -f "assets/sounds/${f}.wav" \
              || { echo "Missing ${f}.wav"; exit 1; }
          done
          echo "All sound assets present and generated."
        shell: bash

      # ── Build ──────────────────────────────────────────────────────────

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test
        run: |
          set -euo pipefail
          HELP_OUTPUT=$(./target/release/zenritme --help)
          echo "${HELP_OUTPUT}"
          if ! echo "${HELP_OUTPUT}" | head -1 \
              | grep -q "zenritme v${VERSION}"; then
            echo "::error::--help output does not include" \
              " expected version 'zenritme v${VERSION}'"
            exit 1
          fi
          # Verify --version output
          ./target/release/zenritme -V
          # Verify --sound-test runs without error
          ./target/release/zenritme --sound-test
        shell: bash

      # ── Package ────────────────────────────────────────────────────────

      - name: Package release archive
        run: |
          set -euo pipefail
          ARCHIVE_NAME="zenritme-v${VERSION}-x86_64-unknown-linux-gnu"
          STAGING="${ARCHIVE_NAME}"
          mkdir -p "${STAGING}/scripts" \
            "${STAGING}/docs" "${STAGING}/assets/sounds"
          cp target/release/zenritme     "${STAGING}/"
          cp scripts/install.sh           "${STAGING}/scripts/"
          cp scripts/uninstall.sh         "${STAGING}/scripts/"
          cp scripts/generate-sounds.py   "${STAGING}/scripts/"
          cp scripts/endurance-smoke.sh   "${STAGING}/scripts/"
          cp scripts/doctor.sh             "${STAGING}/scripts/"
          cp assets/sounds/*.wav           "${STAGING}/assets/sounds/"
          cp assets/sounds/README.md      "${STAGING}/assets/sounds/"
          cp README.md                    "${STAGING}/"
          cp LICENSE                      "${STAGING}/"
          cp NOTICE.md                    "${STAGING}/"
          cp RULES.md                     "${STAGING}/"
          cp docs/SECURITY.md             "${STAGING}/docs/"
          cp docs/ENDURANCE.md            "${STAGING}/docs/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
        shell: bash

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          sha256sum "${ARCHIVE}" > SHA256SUMS
          echo "Checksum:"
          cat SHA256SUMS
        shell: bash

      # ── Release ──────────────────────────────────────────────────────────

      - name: Generate release body
        run: |
          IS_RC=false
          if echo "${VERSION}" | grep -q '-'; then
            IS_RC=true
          fi

          if [ "${IS_RC}" = "true" ]; then
            cat > release-notes.md << BODY
          ## Release Candidate

          This is a pre-release build for testing.
          See [RULES.md](RULES.md) for project policies.

          ### Changes

          - Sound profiles: \`--sound-profile calm|silent\`
          - No-spam cooldown: 500 ms pause, 1 s phase, 2 s complete debounce
          - Automatic temp-file cleanup on exit via RAII guard
          - Polished \`--sound-test\` with cooldown and profile info
          - 236 tests, zero warnings

          BODY
          else
            cat > release-notes.md << BODY
          ## Highlights

          - Premium terminal UI with themed rendering
          - 5 themes: void, ember, aura, forest, mono
          - 3 view modes: minimal, orbit, cinematic
          - Ritual sound architecture: split into focused submodules
          - Built-in procedural notification sounds with no-spam cooldown
          - Sound profiles: \`--sound-profile calm|silent\`
          - Automatic temp-file cleanup on process exit
          - Per-event sound overrides and \`--mute\` flag
          - Zero external Rust dependencies
          - LOC guard enforced (all files under 1000 lines)
          - 236 tests, zero warnings
          - Endurance smoke test and local doctor health check

          BODY
          fi

          # Append common install/uninstall section
          cat >> release-notes.md << BODY
          ## Install

          \`\`\`sh
          tar xzf zenritme-vVERSION-x86_64-unknown-linux-gnu.tar.gz
          cd zenritme-vVERSION-x86_64-unknown-linux-gnu
          sudo ./install.sh
          \`\`\`

          ## Uninstall

          \`\`\`sh
          sudo ./uninstall.sh
          \`\`\`

          ## Assets

          - \`zenritme-vVERSION-x86_64-unknown-linux-gnu.tar.gz\`
            — release binary + docs
          - \`SHA256SUMS\` — checksums
          BODY
          sed -i "s/VERSION/${VERSION}/g" release-notes.md
        shell: bash

      - name: Determine prerelease
        id: prerelease
        run: |
          if echo "${VERSION}" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zenritme v${{ env.VERSION }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            ${{ env.ARCHIVE }}
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
