---
name: CI

"on":
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - 'build.sh'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - 'build.sh'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  check-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build script permissions
        run: chmod +x ./build.sh

      - name: Run check-all
        run: ./build.sh check-all --no-cache
        shell: bash

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash
