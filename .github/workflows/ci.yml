---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect core file changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            HEAD="${{ github.sha }}"
          fi
          FILES=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git ls-files)
          if echo "$FILES" | grep -qE '\.(rs|toml)$|Cargo\.lock$|^build\.rs$|^rust-toolchain|^scripts/|^\.cargo/'; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi

  check-all:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build script permissions
        run: chmod +x ./scripts/build.sh

      - name: Run check-all
        run: ./scripts/build.sh check-all --no-cache
        shell: bash

      - name: LOC guard
        run: bash scripts/check-loc.sh
        shell: bash

  workflow_quality:
    name: Workflow lint + codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow lint tools
        run: |
          python3 -m pip install --user yamllint codespell
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

      - name: Run yamllint
        run: yamllint .github/workflows

      - name: Run codespell
        run: |
          if [ -f .codespellrc ]; then
            codespell --config .codespellrc .
          else
            codespell --skip './.git,./target,./assets,./dist,./node_modules' .
          fi
